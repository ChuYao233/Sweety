# Sweety 完整示例配置文件
# 格式：TOML（同样支持 JSON / YAML，通过文件扩展名自动识别）

# ─────────────────────────────────────────────
# 全局配置
# ─────────────────────────────────────────────
[global]
# Worker 线程数，0 = CPU 核心数
worker_threads = 0
# 管理 API 监听地址（留空则禁用）
admin_listen = "127.0.0.1:9000"
# 管理 API Bearer Token（生产环境请换成随机强密码）
admin_token = "change-me-in-production"
# 全局默认错误日志路径
error_log = "/var/log/sweety/error.log"
# 是否启用 Prometheus 指标接口
prometheus_enabled = true
# Prometheus 指标路径（在 admin_listen 上暴露）
prometheus_path = "/metrics"

# ─────────────────────────────────────────────
# 站点 1：静态网站 + HTTPS + 自动 ACME 证书
# ─────────────────────────────────────────────
[[sites]]
# 站点唯一标识
name = "example-static"
# 匹配的域名列表（支持通配符 *.example.com）
server_name = ["example.com", "www.example.com"]
# 监听端口（HTTP）
listen = [80]
# 监听端口（HTTPS）
listen_tls = [443]
# 网站根目录
root = "/var/www/example"
# 默认文档（按顺序查找）
index = ["index.html", "index.htm"]
# 访问日志路径
access_log = "/var/log/sweety/example_access.log"
# 错误日志路径（不设则使用全局）
error_log = "/var/log/sweety/example_error.log"

# TLS 配置
[sites.tls]
# 使用 ACME 自动申请证书（TLS-ALPN-01，无需开放 80 端口）
acme = true
acme_email = "admin@example.com"
# 证书提供商（默认 letsencrypt）：
#   letsencrypt         — Let's Encrypt 生产环境（90 天，最流行）
#   letsencrypt_staging — Let's Encrypt 测试环境（不消耗配额，证书不受信任）
#   zerossl             — ZeroSSL（90 天，可登录管理面板）
#   buypass             — Buypass / LiteSSL（180 天，挪威 CA）
#   https://...         — 自定义 ACME 目录 URL
acme_provider = "letsencrypt"
# 到期前多少天自动续期（默认 30 天）
acme_renew_days_before = 30
# 或手动指定证书（与 acme = true 二选一）
# cert = "/etc/ssl/example.com.crt"
# key  = "/etc/ssl/example.com.key"

# Location 配置（按优先级从高到低排列）
[[sites.locations]]
# 路径精确匹配 /health
path = "= /health"
handler = "static"
# 直接返回 200 OK（健康检查用）
return_code = 200

[[sites.locations]]
# 前缀优先匹配 /static/
path = "^~ /static/"
handler = "static"
# 强制缓存 7 天
cache_control = "public, max-age=604800, immutable"

[[sites.locations]]
# 默认 location
path = "/"
handler = "static"

# ─────────────────────────────────────────────
# 站点 2：WordPress / PHP 站点（生产级配置）
# 等价宝塔面板 Nginx PHP 站点模板
# ─────────────────────────────────────────────
[[sites]]
name        = "wordpress"
server_name = ["www.example.com", "example.com"]
listen      = [80]
listen_tls  = [443]
root        = "/var/www/wordpress"
index       = ["index.php", "index.html"]
access_log  = "/var/log/sweety/wordpress_access.log"
# 强制 HTTP → HTTPS（需配置 listen_tls）
force_https = true
# WordPress 上传文件大小限制（需与 php.ini upload_max_filesize 一致）
# client_max_body_size 在 [global] 里设置，这里继承

# ACME 自动证书
[sites.tls]
acme                   = true
acme_email             = "admin@example.com"
acme_provider          = "letsencrypt"   # 可选: letsencrypt / zerossl / letsencrypt_staging
acme_renew_days_before = 30

# 自定义错误页
[sites.error_pages]
404 = "/404.html"
500 = "/500.html"

# PHP-FPM 连接（优先用 Unix socket，性能优于 TCP）
[sites.fastcgi]
socket       = "/var/run/php/php8.2-fpm.sock"
# 备选 TCP 模式（容器化部署时常用）：
# host = "127.0.0.1"
# port = 9000
pool_size    = 32   # 连接池 idle 连接数
connect_timeout = 5
read_timeout = 60   # WordPress 后台操作可能耗时较长

# ── Location 1：静态资源强缓存（等价宝塔 Nginx 静态文件规则）──────────────
[[sites.locations]]
path          = "^~ /wp-content/uploads/"
handler       = "static"
cache_control = "public, max-age=2592000"  # 30 天

[[sites.locations]]
path          = "^~ /wp-content/"
handler       = "static"
cache_control = "public, max-age=604800"   # 7 天

[[sites.locations]]
path          = "^~ /wp-includes/"
handler       = "static"
cache_control = "public, max-age=604800"

# ── Location 2：拒绝访问敏感文件（等价宝塔安全规则）────────────────────────
[[sites.locations]]
path        = "~ /\\."
handler     = "static"
return_code = 403

[[sites.locations]]
# 禁止直接访问 xmlrpc.php（防 DDoS 攻击，WordPress 特有）
path        = "= /xmlrpc.php"
handler     = "static"
return_code = 403

# ── Location 3：PHP 文件执行（等价 Nginx ~ \.php$ 块）───────────────────────
# Sweety 的 FastCGI handler 会自动：
#   - 检查 SCRIPT_FILENAME 文件是否存在（防 Primary script unknown）
#   - 传递 HTTPS=on（WordPress is_ssl() 正常工作）
#   - 传递所有 HTTP_* 头（Cookie、Authorization 等）
#   - POST 请求体通过 STDIN 传给 PHP-FPM
[[sites.locations]]
path    = "~ \\.php$"
handler = "fastcgi"

# ── Location 4：WordPress 伪静态（等价宝塔 try_files 规则）─────────────────
# 访问 /wp-admin/ 等非 .php 路径时：
#   1. 先尝试静态文件（$uri）
#   2. 再尝试目录（$uri/）
#   3. 最后 fallback 到 index.php（WordPress 路由入口）
# FastCGI handler 会检查 /var/www/wordpress/index.php 是否存在
[[sites.locations]]
path      = "/"
handler   = "fastcgi"
try_files = ["$uri", "$uri/", "/index.php"]

# ── 限流配置（防爆破 wp-login.php）────────────────────────────────────────
[sites.rate_limit]
[[sites.rate_limit.rules]]
dimension    = "path"
path_pattern = "^/wp-login\\.php"
rate         = 5      # 每秒最多 5 次登录请求
burst        = 10

[[sites.rate_limit.rules]]
dimension = "ip"
rate      = 100
burst     = 200

# ─────────────────────────────────────────────
# 站点 3：反向代理站点（负载均衡）
# ─────────────────────────────────────────────
[[sites]]
name = "example-proxy"
server_name = ["api.example.com"]
listen = [80]
listen_tls = [443]
access_log = "/var/log/sweety/api_access.log"

[sites.tls]
acme = true
acme_email = "admin@example.com"

# 上游服务器组
[[sites.upstreams]]
name = "backend"
# 负载均衡策略：round_robin / weighted / least_conn / ip_hash
strategy = "least_conn"
# 健康检查
[sites.upstreams.health_check]
enabled = true
interval = 10       # 检查间隔（秒）
timeout  = 3        # 超时（秒）
path     = "/health"
# 上游节点列表
[[sites.upstreams.nodes]]
addr   = "127.0.0.1:8001"
weight = 1
[[sites.upstreams.nodes]]
addr   = "127.0.0.1:8002"
weight = 2
[[sites.upstreams.nodes]]
addr   = "127.0.0.1:8003"
weight = 1

[[sites.locations]]
path = "/"
handler = "reverse_proxy"
upstream = "backend"
# 请求镜像（可选，调试用）
# mirror = "http://127.0.0.1:9999"

# ─────────────────────────────────────────────
# 站点 4：WebSocket 站点
# ─────────────────────────────────────────────
[[sites]]
name = "example-ws"
server_name = ["ws.example.com"]
listen = [80]
listen_tls = [443]
access_log = "/var/log/sweety/ws_access.log"

[sites.tls]
acme = true
acme_email = "admin@example.com"

[[sites.locations]]
path = "/ws"
handler = "websocket"
# 最大并发连接数
max_connections = 10000
# 上游 WebSocket 后端（若需要转发）
# upstream_ws = "ws://127.0.0.1:8080/ws"

[[sites.locations]]
path = "/"
handler = "static"
root = "/var/www/ws-site"

# ─────────────────────────────────────────────
# 站点 5：新功能综合示例
# 展示：return/try_files/error_page/sub_filter/
#       proxy_cache/访问日志/force_https
# ─────────────────────────────────────────────
[[sites]]
name        = "example-full"
server_name = ["full.example.com"]
listen      = [80]
listen_tls  = [443]
root        = "/var/www/full-site"
access_log  = "/var/log/sweety/full_access.log"
# HTTP → HTTPS 强制跳转（需配置 listen_tls 才生效）
force_https = true

# 自定义错误页（等价 Nginx error_page 404 /404.html）
# key = HTTP 状态码（字符串），value = 相对于 root 的路径
[sites.error_pages]
404 = "/404.html"
500 = "/500.html"
503 = "/503.html"

# 反代响应缓存（等价 Nginx proxy_cache）
[sites.proxy_cache]
# 磁盘缓存目录（不设则仅用内存）
path        = "/var/cache/sweety/full"
# 内存最大缓存条数
max_entries = 2000
# 缓存 TTL（秒）
ttl         = 300
# 可缓存状态码
cacheable_statuses = [200, 301, 302, 304]
# 可缓存方法
cacheable_methods  = ["GET", "HEAD"]
# 有以下请求头时跳过缓存
bypass_headers     = ["Authorization", "Cookie", "X-No-Cache"]

[sites.tls]
acme                   = true
acme_email             = "admin@example.com"
acme_provider          = "letsencrypt"
acme_renew_days_before = 30
min_version            = "tls1.2"
max_version            = "tls1.3"

# 上游
[[sites.upstreams]]
name     = "app-backend"
strategy = "round_robin"
[[sites.upstreams.nodes]]
addr = "127.0.0.1:3000"

# Location 1：return 指令（带 URL，等价 Nginx return 301 https://...）
[[sites.locations]]
path       = "= /old-page"
handler    = "static"
# 301 永久跳转，支持 $request_uri 变量
return_url = "301 https://full.example.com/new-page"

# Location 2：try_files（等价 Nginx try_files $uri $uri/ /index.html）
# 场景：SPA 单页应用，所有路径都 fallback 到 index.html
[[sites.locations]]
path      = "/"
handler   = "static"
try_files = ["$uri", "$uri/", "/index.html"]

# Location 3：反代 + sub_filter + cache_rules + proxy_set_header
[[sites.locations]]
path     = "/api/"
handler  = "reverse_proxy"
upstream = "app-backend"

# 自定义转发请求头（等价 Nginx proxy_set_header）
# 支持变量: $remote_addr / $host / $scheme / $request_uri
[[sites.locations.proxy_set_headers]]
name  = "X-Real-IP"
value = "$remote_addr"

[[sites.locations.proxy_set_headers]]
name  = "X-Forwarded-For"
value = "$remote_addr"

[[sites.locations.proxy_set_headers]]
name  = "X-Forwarded-Proto"
value = "$scheme"

[[sites.locations.proxy_set_headers]]
name  = "Host"
value = "$host"

# 向客户端响应注入自定义头（等价 Nginx add_header）
[[sites.locations.add_headers]]
name  = "X-Frame-Options"
value = "SAMEORIGIN"

[[sites.locations.add_headers]]
name  = "X-Content-Type-Options"
value = "nosniff"

[[sites.locations.add_headers]]
name  = "X-Cache-Status"
value = "$upstream_cache_status"

# 响应体内容替换（等价 Nginx sub_filter）
# pattern 以 ~ 开头表示正则，否则为字符串替换
[[sites.locations.sub_filter]]
pattern     = "http://internal-api.local"
replacement = "https://full.example.com"

[[sites.locations.sub_filter]]
# 正则替换：去掉 HTML 注释
pattern     = "~ <!--.*?-->"
replacement = ""

# 按扩展名设置缓存（等价 Nginx if $uri ~* ... { expires ... }）
[[sites.locations.cache_rules]]
pattern       = "\\.(gif|png|jpg|jpeg|webp|css|js|woff2?)$"
cache_control = "public, max-age=2592000, immutable"

[[sites.locations.cache_rules]]
pattern       = "\\.html$"
cache_control = "no-cache"
