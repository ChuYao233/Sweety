user nginx;
worker_processes 2;
worker_rlimit_nofile 1048576;

events {
    use epoll;
    worker_connections 65535;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    charset       off;
    server_tokens off;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    aio threads;
    directio 8m;
    directio_alignment 4k;
    output_buffers 1 512k;

    keepalive_timeout 75;
    keepalive_requests 100000;

    reset_timedout_connection on;
    client_max_body_size 0;
    client_body_timeout 15s;
    send_timeout 300s;

    open_file_cache max=200000 inactive=120s;
    open_file_cache_valid 120s;
    open_file_cache_min_uses 1;
    open_file_cache_errors on;

    types_hash_max_size 4096;

    access_log off;
    log_not_found off;
}

# 站点配置（/etc/nginx/conf.d/local.conf）
server {
    listen 80;
    listen [::]:80;
    server_name 172.24.174.28;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    listen 443 quic reuseport;
    listen [::]:443 quic reuseport;

    server_name 172.24.174.28;

    root /www/wwwroot/local;
    index index.html index.htm;

    autoindex on;
    autoindex_exact_size off;
    autoindex_localtime on;

    ssl_certificate     /www/cert/cert.pem;
    ssl_certificate_key /www/cert/key.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_prefer_server_ciphers off;
    ssl_early_data on;

    add_header Alt-Svc 'h3=":443"; ma=86400' always;
    add_header X-HTTP3 $http3 always;
    add_header Accept-Ranges bytes always;
    add_header X-Content-Type-Options nosniff always;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.bin$ {
        default_type application/octet-stream;
        try_files $uri =404;
    }
}
