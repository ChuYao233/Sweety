name: Release

# 触发条件：推送 tag
#   v*     → 稳定版 Release（v0.2.0）
#   pre-*  → Pre-release（pre-0.2.0-rc1）
on:
  push:
    tags:
      - 'v*'
      - 'pre-*'

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: sweety
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ═══════════════════════════════════════════
          # Linux musl（静态链接，单文件部署）
          # ═══════════════════════════════════════════
          - target: x86_64-unknown-linux-musl
            os: ubuntu-24.04
            artifact: sweety-linux-amd64-musl
            cross: false

          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04
            artifact: sweety-linux-aarch64-musl
            cross: true

          # ═══════════════════════════════════════════
          # Linux gnu（动态链接）
          # ═══════════════════════════════════════════
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            artifact: sweety-linux-amd64-gnu
            cross: false

          - target: i686-unknown-linux-gnu
            os: ubuntu-24.04
            artifact: sweety-linux-i686-gnu
            cross: true

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04
            artifact: sweety-linux-aarch64-gnu
            cross: true

          - target: armv7-unknown-linux-gnueabihf
            os: ubuntu-24.04
            artifact: sweety-linux-armv7-gnu
            cross: true

          - target: riscv64gc-unknown-linux-gnu
            os: ubuntu-24.04
            artifact: sweety-linux-riscv64-gnu
            cross: true

          # ═══════════════════════════════════════════
          # FreeBSD
          # ═══════════════════════════════════════════
          - target: x86_64-unknown-freebsd
            os: ubuntu-24.04
            artifact: sweety-freebsd-amd64
            cross: true

          # ═══════════════════════════════════════════
          # Windows
          # ═══════════════════════════════════════════
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: sweety-windows-amd64
            cross: false

          - target: i686-pc-windows-msvc
            os: windows-latest
            artifact: sweety-windows-i686
            cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ── 依赖安装 ────────────────────────────────────
      - name: Install musl-tools (native musl)
        if: matrix.target == 'x86_64-unknown-linux-musl' && !matrix.cross
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@cross

      - name: Install cmake (Linux)
        if: runner.os == 'Linux' && !matrix.cross
        run: sudo apt-get update && sudo apt-get install -y cmake

      # i686 Windows 需要额外 target
      - name: Add i686 target (Windows)
        if: matrix.target == 'i686-pc-windows-msvc'
        run: rustup target add i686-pc-windows-msvc

      # ── 构建 ──────────────────────────────────────
      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      # ── 打包 ──────────────────────────────────────
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }}.tar.gz ${{ env.BINARY_NAME }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd target\${{ matrix.target }}\release
          Compress-Archive -Path "${{ env.BINARY_NAME }}.exe" -DestinationPath "..\..\..\${{ matrix.artifact }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
          if-no-files-found: ignore

  # ═══════════════════════════════════════════════════
  # 发布到 GitHub Releases
  # ═══════════════════════════════════════════════════
  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR artifacts/

      - name: Generate SHA256SUMS.txt
        run: |
          cd artifacts
          sha256sum *.tar.gz *.zip 2>/dev/null | sort > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Determine release type
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" == pre-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "name=Pre-release $TAG" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "name=Release $TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/SHA256SUMS.txt
