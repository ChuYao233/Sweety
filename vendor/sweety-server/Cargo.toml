[package]
edition = "2024"
name = "sweety-server"
version = "0.5.0"
authors = ["fakeshadow <everestshadow@gmail.com>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "http server for sweety"
readme = "README.md"
keywords = [
    "sweety",
    "sweety-web",
]
license = "Apache-2.0"
repository = "https://github.com/HFQR/sweety-web"
resolver = "2"

[features]
io-uring = ["tokio-uring"]
quic = ["sweety-io-compat/quic"]

[lib]
name = "sweety_server"
path = "src/lib.rs"

[dependencies.tokio]
version = "1.30"
features = [
    "sync",
    "time",
]

[dependencies.tokio-uring]
version = "0.5"
optional = true

[dependencies.tracing]
version = "0.1.40"
default-features = false

[dependencies.sweety-io-compat]
path = "../sweety-io-v4"
features = ["runtime"]

[dependencies.sweety-service]
path = "../sweety-service"
features = ["alloc"]

[dependencies.sweety-collection]
path = "../sweety-collection"

[dev-dependencies.bytes]
version = "1.4"

[dev-dependencies.tokio]
version = "1.30"
features = [
    "io-util",
    "macros",
]

[target.'cfg(not(target_family = "wasm"))'.dependencies.socket2]
version = "0.5.1"

[target.'cfg(target_os = "linux")'.dependencies.libc]
version = "0.2"

[target.'cfg(not(target_family = "wasm"))'.dependencies.tokio]
version = "1.30"
