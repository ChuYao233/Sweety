# Sweety 配置 —— 静态站点测试
#
# HTTP:  http://127.0.0.1:80
# HTTPS: https://127.0.0.1:443
# 双证书：ECDSA P-256（全平台）+ Ed25519（新版客户端）

[global]
# Worker 线程数，0 = CPU 核心数（等价 Nginx worker_processes auto）
worker_threads = 0
# 最大并发连接数（等价 Nginx worker_connections）
worker_connections = 51200
# Keep-Alive 超时（秒，等价 Nginx keepalive_timeout）
keepalive_timeout = 60
# 客户端最大请求体（MB，等价 Nginx client_max_body_size）
client_max_body_size = 50
# 请求头缓冲区（KB，等价 Nginx client_header_buffer_size）
client_header_buffer_size = 32
# 请求体缓冲区（KB，等价 Nginx client_body_buffer_size）
client_body_buffer_size = 512
# 全局 gzip 压缩
gzip = true
# 最小压缩文件大小（KB，等价 Nginx gzip_min_length 1k）
gzip_min_length = 1
# 压缩等级 1-9（等价 Nginx gzip_comp_level）
gzip_comp_level = 5
log_level = "sweety_lib=info,xitca_server=warn,xitca_web=warn,xitca_http=warn"

[[sites]]
name        = "static-test"
server_name = ["127.0.0.1", "localhost", "172.19.0.1"]
listen      = [80]
listen_tls  = [443]
root        = 'E:\杂项\网站源码\阿付自用超好看个人主页源码'
index       = ["index.html", "index.htm"]
# 是否作为 fallback 站点（未匹配其他站点时使用，相当于 Nginx default_server）
# fallback = true
# 站点级 gzip 覆盖（不设则继承全局 global.gzip）
# gzip = true
# gzip_comp_level = 6
# 是否允许 WebSocket 升级（默认 true）
# websocket = true

# 双证书：SniResolver 按客户端 ClientHello 签名方案自动选最优
# Windows/Android/iOS 不支持 Ed25519 时自动降级到 ECDSA
[sites.tls]
# TLS 版本控制（默认 tls1.2 ~ tls1.3）
# 仅允许 TLS 1.3（最高安全性，不兼容老客户端）：
# min_version = "tls1.3"
# 兼容模式（允许 TLS 1.2 + 1.3，默认值，无需显式配置）：
min_version = "tls1.2"
max_version = "tls1.3"

[[sites.tls.certs]]
cert = "test_cert/ecdsa/cert.pem"
key  = "test_cert/ecdsa/key.pem"

[[sites.tls.certs]]
cert = "test_cert/ed22519/cert.pem"
key  = "test_cert/ed22519/key.pem"

[[sites.locations]]
path    = "/"
handler = "static"
